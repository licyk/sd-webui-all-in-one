name: Build Qwen TTS WebUI

on:
  workflow_dispatch:

jobs:
  Build-Qwen-TTS-WebUI:
    name: Build Qwen TTS WebUI
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup portable build
        uses: ./.github/actions/setup-portable-build

      - name: Launch Qwen TTS WebUI Installer
        env:
          SD_WEBUI_ALL_IN_ONE_SKIP_TORCH_DEVICE_COMPATIBILITY: 1
        shell: pwsh
        run: |
          & "${{ github.workspace }}/installer/qwen_tts_webui_installer.ps1" `
            -InstallPath "${{ github.workspace }}/qwen_tts_webui" `
            -PyTorchMirrorType cu130 `
            -BuildMode `
            -BuildWithLaunch `
            -DisableAutoMirror `
            -DisablePyPIMirror `
            -DisableGithubMirror `
            -DisableHuggingFaceMirror

      - name: Install FFmpeg
        shell: pwsh
        run: |
          & "${{ github.workspace }}/.github/install_ffmpeg.ps1" `
            -InstallPath "${{ github.workspace }}/qwen_tts_webui/git/bin"

      - name: Finalize portable package
        uses: ./.github/actions/finalize-portable
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        with:
          install-path: ${{ github.workspace }}/qwen_tts_webui
          software-name: qwen_tts_webui
          upload-path: ${{ github.workspace }}/sd-webui-all-in-one
          hf-repo-id: licyk/sd-webui-all-in-one
          ms-repo-id: licyks/sd-webui-all-in-one
