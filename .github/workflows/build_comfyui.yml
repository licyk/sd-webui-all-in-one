name: Build ComfyUI

on:
  workflow_dispatch:

jobs:
  Build-ComfyUI:
    name: Build ComfyUI
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup portable build
        uses: ./.github/actions/setup-portable-build

      - name: Launch ComfyUI Installer
        env:
          SD_WEBUI_ALL_IN_ONE_SKIP_TORCH_DEVICE_COMPATIBILITY: 1
        shell: pwsh
        run: |
          & "${{ github.workspace }}/installer/comfyui_installer.ps1" `
            -InstallPath "${{ github.workspace }}/comfyui" `
            -PyTorchMirrorType cu130 `
            -BuildMode `
            -BuildWithLaunch `
            -DisableAutoMirror `
            -DisablePyPIMirror `
            -DisableGithubMirror `
            -DisableHuggingFaceMirror `
            -InstallHanamizuki `
            -NoPreDownloadModel

      - name: Launch ComfyUI to init custom nodes
        shell: pwsh
        env:
          PIP_NO_WARN_SCRIPT_LOCATION: 0
          PIP_DISABLE_PIP_VERSION_CHECK: 1
        continue-on-error: true
        run: |
          Set-Location -Path "${{ github.workspace }}/comfyui/core"
          & "${{ github.workspace }}/comfyui/core/python/python.exe" "${{ github.workspace }}/comfyui/core/main.py" --quick-test-for-ci --cpu

      - name: Launch to complete dependencies
        shell: pwsh
        run: |
          & "${{ github.workspace }}/comfyui/launch.ps1" `
            -BuildMode `
            -DisableAutoMirror `
            -DisablePyPIMirror `
            -DisableGithubMirror `
            -DisableHuggingFaceMirror

      - name: Finalize portable package
        uses: ./.github/actions/finalize-portable
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
          WORKSPACE: ${{ github.workspace }}
        with:
          install-path: ${{ github.workspace }}/comfyui
          software-name: comfyui
