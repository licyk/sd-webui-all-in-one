name: Build Fooocus

on:
  workflow_dispatch:

jobs:
  Build-Fooocus:
    name: Build Fooocus
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup portable build
        uses: ./.github/actions/setup-portable-build

      - name: Launch Fooocus Installer
        env:
          SD_WEBUI_ALL_IN_ONE_SKIP_TORCH_DEVICE_COMPATIBILITY: 1
        shell: pwsh
        run: |
          & "${{ github.workspace }}/installer/fooocus_installer.ps1" `
            -InstallPath "${{ github.workspace }}/fooocus" `
            -PyTorchMirrorType cu130 `
            -BuildMode `
            -BuildWithLaunch `
            -InstallBranch "fooocus_main" `
            -DisableAutoMirror `
            -DisablePyPIMirror `
            -DisableGithubMirror `
            -DisableHuggingFaceMirror `
            -InstallHanamizuki `
            -NoPreDownloadModel

      - name: Finalize portable package
        uses: ./.github/actions/finalize-portable
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        with:
          install-path: ${{ github.workspace }}/fooocus
          software-name: fooocus
          upload-path: ${{ github.workspace }}/sdnote
          hf-repo-id: licyk/sdnote
          ms-repo-id: licyks/sdnote
