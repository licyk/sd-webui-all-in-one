name: Python Lint

on:
  push:
    paths:
      - "sd_webui_all_in_one/**"
      - "pyproject.toml"
      - ".github/workflows/py-lint.yml"
  workflow_dispatch:

jobs:
  Python-Lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install lint dependencies
        run: uv pip install --system --python "$(command -v python)" -e . --group dev

      - name: Run Ruff
        uses: astral-sh/ruff-action@v4
        with:
          src: >-
            sd_webui_all_in_one

      - name: Run docstring checker
        run: python -m python_docstring_checker sd_webui_all_in_one

  Ty:
    name: Ty on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            ty-platform: linux
          - os: windows-latest
            ty-platform: win32
          - os: macos-latest
            ty-platform: darwin

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Run ty
        shell: bash
        run: |
          PYTHON_PATH="$(uv run --group dev python -c "import sys; print(sys.executable)")"
          uv run --group dev python -m ty check sd_webui_all_in_one --python "$PYTHON_PATH" --python-version 3.10 --python-platform "${{ matrix.ty-platform }}" --output-format github --no-progress
