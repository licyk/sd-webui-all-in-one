name: Python Lint

on:
  push:
    paths:
      - "sd_webui_all_in_one/**"
      - "pyproject.toml"
      - ".github/workflows/py-lint.yml"
  workflow_dispatch:

jobs:
  Python-Lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Install lint dependencies
        run: uv pip install --system --python "$(command -v python)" -e . --group dev

      - name: Run Ruff
        uses: astral-sh/ruff-action@v3
        with:
          src: >-
            sd_webui_all_in_one

      - name: Run ty
        run: ty check --python "$(command -v python)" --python-version 3.10 --output-format github --no-progress sd_webui_all_in_one

      - name: Run docstring checker
        run: python -m python_docstring_checker sd_webui_all_in_one
