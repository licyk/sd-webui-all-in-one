name: Build SD WebUI Forge

on:
  workflow_dispatch:

jobs:
  Build-SD-WebUI-Forge:
    name: Build SD WebUI Forge
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup portable build
        uses: ./.github/actions/setup-portable-build

      - name: Launch SD WebUI Installer
        env:
          SD_WEBUI_ALL_IN_ONE_SKIP_TORCH_DEVICE_COMPATIBILITY: 1
        shell: pwsh
        run: |
          & "${{ github.workspace }}/installer/stable_diffusion_webui_installer.ps1" `
            -InstallPath "${{ github.workspace }}/sd_webui_forge" `
            -PyTorchMirrorType cu130 `
            -BuildMode `
            -BuildWithLaunch `
            -InstallBranch "sd_webui_forge" `
            -NoPreDownloadModel `
            -DisableAutoMirror `
            -DisablePyPIMirror `
            -DisableGithubMirror `
            -InstallHanamizuki `
            -DisableHuggingFaceMirror

      - name: Install Insightface
        shell: pwsh
        env:
          UV_PYTHON: "${{ github.workspace }}/sd_webui_forge/core/python/python.exe"
          UV_LINK_MODE: copy
        run: |
          uv pip install insightface

      - name: Install OpenPose Editor Assets
        shell: pwsh
        run: |
          & "${{ github.workspace }}/.github/install_openpose_editor_assets.ps1" `
            -InstallPath "${{ github.workspace }}/sd_webui_forge/core/extensions/sd-webui-openpose-editor/dist"

      - name: Launch SD WebUI Forge to init component
        shell: pwsh
        env:
          PIP_NO_WARN_SCRIPT_LOCATION: 0
          PIP_DISABLE_PIP_VERSION_CHECK: 1
        continue-on-error: true
        run: |
          Set-Location -Path "${{ github.workspace }}/sd_webui_forge/core"
          & "${{ github.workspace }}/sd_webui_forge/core/python/python.exe" `
            "${{ github.workspace }}/sd_webui_forge/core/launch.py" `
            --exit `
            --skip-torch-cuda-test `
            --use-cpu all `
            --skip-version-check `
            --skip-python-version-check

      - name: Launch to complete dependencies
        shell: pwsh
        run: |
          & "${{ github.workspace }}/sd_webui_forge/launch.ps1" `
            -BuildMode `
            -DisableAutoMirror `
            -DisablePyPIMirror `
            -DisableGithubMirror `
            -DisableHuggingFaceMirror

      - name: Download VAE approx model
        shell: pwsh
        run: |
          & "${{ github.workspace }}/.github/install_vae_approx_model.ps1" `
            -VAEApproxPath "${{ github.workspace }}/sd_webui_forge/core/models/VAE-approx"

      - name: Finalize portable package
        uses: ./.github/actions/finalize-portable
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        with:
          install-path: ${{ github.workspace }}/sd_webui_forge
          software-name: sd_webui_forge
          upload-path: ${{ github.workspace }}/sdnote
          hf-repo-id: licyk/sdnote
          ms-repo-id: licyks/sdnote
