name: Build SD-Trainer

on:
  workflow_dispatch:

jobs:
  Build-SD-Trainer:
    name: Build SD-Trainer
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup portable build
        uses: ./.github/actions/setup-portable-build

      - name: Launch SD-Trainer Installer
        env:
          SD_WEBUI_ALL_IN_ONE_SKIP_TORCH_DEVICE_COMPATIBILITY: 1
        shell: pwsh
        run: |
          & "${{ github.workspace }}/installer/sd_trainer_installer.ps1" `
            -InstallPath "${{ github.workspace }}/sd_trainer" `
            -PyTorchMirrorType cu128 `
            -BuildMode `
            -BuildWithLaunch `
            -InstallBranch "sd_trainer_main" `
            -DisableAutoMirror `
            -DisablePyPIMirror `
            -DisableGithubMirror `
            -InstallHanamizuki `
            -DisableHuggingFaceMirror `
            -NoPreDownloadModel

      - name: Finalize portable package
        uses: ./.github/actions/finalize-portable
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          MODELSCOPE_API_TOKEN: ${{ secrets.MODELSCOPE_API_TOKEN }}
        with:
          install-path: ${{ github.workspace }}/sd_trainer
          software-name: sd_trainer
          upload-path: ${{ github.workspace }}/sd-webui-all-in-one
          hf-repo-id: licyk/sd-webui-all-in-one
          ms-repo-id: licyks/sd-webui-all-in-one
