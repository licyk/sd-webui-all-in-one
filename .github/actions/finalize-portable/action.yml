name: Finalize Portable Package
description: Build docs, archive, and upload a portable package.

inputs:
  install-path:
    description: Portable package install directory.
    required: true
  software-name:
    description: Portable package archive software name.
    required: true
  upload-path:
    description: Portable package upload root directory.
    required: false
    default: ""
  hf-repo-id:
    description: HuggingFace repository ID for portable upload.
    required: false
    default: ""
  hf-repo-type:
    description: HuggingFace repository type for portable upload.
    required: false
    default: model
  ms-repo-id:
    description: ModelScope repository ID for portable upload.
    required: false
    default: ""
  ms-repo-type:
    description: ModelScope repository type for portable upload.
    required: false
    default: model
  revision:
    description: Repository branch, tag, or commit for portable upload.
    required: false
    default: ""
  path-in-repo:
    description: Repository path prefix for portable upload.
    required: false
    default: ""
  public:
    description: Create missing repositories as public.
    required: false
    default: "false"
  upload-threads:
    description: Upload threads per target repository.
    required: false
    default: "1"
  target-workers:
    description: Concurrent target repository upload workers.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Make docs
      shell: pwsh
      run: |
        python "${{ github.workspace }}/.github/make_docs.py" "${{ inputs.install-path }}"

    - name: Clean cache dir
      shell: pwsh
      run: |
        Remove-Item -Path "${{ inputs.install-path }}/cache" -Force -Recurse

    - name: Archive
      shell: pwsh
      run: |
        & "${{ github.workspace }}/.github/archive_portable.ps1" `
          -SoftwareName "${{ inputs.software-name }}" `
          -Workspace "${{ github.workspace }}" `
          -Source "${{ inputs.install-path }}" `
          -SaveDst "${{ github.workspace }}/sdnote/portable/nightly" `
          -Author "licyk"

    - name: Install HuggingFace and ModelScope library
      shell: pwsh
      env:
        UV_SYSTEM_PYTHON: 1
        UV_LINK_MODE: copy
      run: |
        uv pip install huggingface_hub modelscope --upgrade

    - name: Upload to HuggingFace and ModelScope repos
      shell: pwsh
      env:
        PYTHONPATH: ${{ github.workspace }}
      run: |
        $uploadPath = "${{ inputs.upload-path }}"
        if ([string]::IsNullOrWhiteSpace($uploadPath)) {
          $uploadPath = "${{ github.workspace }}/sdnote"
        }

        $uploadArgs = @(
          "self-manager",
          "portable",
          "upload",
          $uploadPath
        )

        if (-not [string]::IsNullOrWhiteSpace("${{ inputs.hf-repo-id }}")) {
          $uploadArgs += @("--hf-repo-id", "${{ inputs.hf-repo-id }}")
          $uploadArgs += @("--hf-repo-type", "${{ inputs.hf-repo-type }}")
        }
        if (-not [string]::IsNullOrWhiteSpace("${{ inputs.ms-repo-id }}")) {
          $uploadArgs += @("--ms-repo-id", "${{ inputs.ms-repo-id }}")
          $uploadArgs += @("--ms-repo-type", "${{ inputs.ms-repo-type }}")
        }
        if (-not [string]::IsNullOrWhiteSpace("${{ inputs.revision }}")) {
          $uploadArgs += @("--revision", "${{ inputs.revision }}")
        }
        if (-not [string]::IsNullOrWhiteSpace("${{ inputs.path-in-repo }}")) {
          $uploadArgs += @("--path-in-repo", "${{ inputs.path-in-repo }}")
        }
        if ("${{ inputs.public }}" -eq "true") {
          $uploadArgs += "--public"
        }
        if (-not [string]::IsNullOrWhiteSpace("${{ inputs.upload-threads }}")) {
          $uploadArgs += @("--threads", "${{ inputs.upload-threads }}")
        }
        if (-not [string]::IsNullOrWhiteSpace("${{ inputs.target-workers }}")) {
          $uploadArgs += @("--target-workers", "${{ inputs.target-workers }}")
        }

        python -m sd_webui_all_in_one @uploadArgs
